{% extends "Bookstore_app/base.html" %}
{% block content %}

<h2 class="text-center mb-4">{{ title }}</h2>

<table class="table table-bordered text-center">
    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
        </tr>
    </thead>

    <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author.name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
